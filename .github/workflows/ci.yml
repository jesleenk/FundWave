name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # -----------------------------------------------------------------------
  # Soroban contract: build to wasm + run unit tests
  # -----------------------------------------------------------------------
  contract:
    name: contract (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/fundwave
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target
        uses: actions/checkout@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/fundwave/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/fundwave/Cargo.lock', 'contracts/fundwave/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Run contract unit tests
        run: cargo test --locked

      - name: Build contract wasm
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: fundwave-wasm
          path: contracts/fundwave/target/wasm32-unknown-unknown/release/fundwave.wasm
          if-no-files-found: error
          retention-days: 14

  # -----------------------------------------------------------------------
  # Web app: install + typecheck + lint + build
  # -----------------------------------------------------------------------
  web:
    name: web (typecheck + lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_CONTRACT_ID: placeholder-for-ci
